<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>گالری سما زرین | ورود</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-[#f4f4f6] flex items-center justify-center min-h-screen p-4">

    <div id="auth-box" class="w-full max-w-sm bg-white p-8 rounded-3xl shadow-sm border border-stone-100">
        <h1 class="text-center text-xl font-light text-stone-800 mb-6">ورود به سما زرین</h1>
        
        <form onsubmit="saveUser(event)" class="space-y-4">
            <div>
                <label class="text-xs text-stone-500 mr-1">نام و نام‌خانوادگی</label>
                <input type="text" id="name" required class="w-full p-3 mt-1 rounded-xl bg-stone-50 border border-stone-200 text-sm">
            </div>
            <div>
                <label class="text-xs text-stone-500 mr-1">شماره همراه</label>
                <input type="tel" id="phone" required class="w-full p-3 mt-1 rounded-xl bg-stone-50 border border-stone-200 text-sm text-center font-mono">
            </div>
            <button type="submit" class="w-full bg-stone-900 text-white py-3 rounded-xl text-sm mt-2 hover:bg-stone-800">ورود به ویترین</button>
        </form>
    </div>

    <script>
        function saveUser(e) {
            e.preventDefault();
            const userData = {
                name: document.getElementById('name').value,
                phone: document.getElementById('phone').value
            };
            
            // ذخیره نام و شماره در حافظه
            localStorage.setItem('sama_user', JSON.stringify(userData));
            
            alert("خوش آمدید " + userData.name + " عزیز!");
            window.location.reload();
        }

        // بررسی اینکه آیا کاربر قبلاً وارد شده یا نه
        if (localStorage.getItem('sama_user')) {
            const user = JSON.parse(localStorage.getItem('sama_user'));
            document.body.innerHTML = `
                <div class="text-center p-8">
                    <h2 class="text-2xl font-bold">سلام ${user.name} عزیز!</h2>
                    <p class="text-stone-600 mt-2">به ویترین طلا و جواهرات سما زرین خوش آمدید.</p>
                    <button onclick="localStorage.removeItem('sama_user'); location.reload();" class="mt-6 text-xs text-red-500 underline">خروج از حساب</button>
                </div>
            `;
        }
    </script>
</body>
</html>
